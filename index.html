<!DOCTYPE html>
<html>
<head>
<title>Receipt Keeper | Cloud Sync</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
}

body {
  background: #f5f7fb;
  min-height: 100vh;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: 0 auto;
}

/* Header */
.app-header {
  background: white;
  border-radius: 20px;
  padding: 20px 25px;
  margin-bottom: 20px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.03);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 15px;
}

.app-header h1 {
  font-size: 1.8rem;
  font-weight: 600;
  color: #1a1e2b;
  display: flex;
  align-items: center;
  gap: 10px;
}

.app-header h1 span {
  background: #4361ee;
  color: white;
  font-size: 0.9rem;
  padding: 4px 10px;
  border-radius: 30px;
  font-weight: 400;
}

/* Auth Section */
.auth-section {
  display: flex;
  align-items: center;
  gap: 15px;
}

.user-info {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #f8fafd;
  padding: 8px 16px;
  border-radius: 40px;
  border: 1px solid #eef2f6;
}

.user-email {
  font-size: 0.9rem;
  color: #1a1e2b;
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
}

.auth-btn {
  background: #4361ee;
  color: white;
  border: none;
  padding: 8px 20px;
  border-radius: 40px;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid #4361ee;
}

.auth-btn:hover {
  background: #3651d4;
}

.auth-btn.secondary {
  background: white;
  color: #4361ee;
  border: 1px solid #4361ee;
}

.auth-btn.secondary:hover {
  background: #f0f4ff;
}

/* Settings Toggle */
.settings-toggle {
  background: #f8fafd;
  border: none;
  padding: 10px 18px;
  border-radius: 40px;
  font-size: 0.95rem;
  color: #1a1e2b;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.2s;
  border: 1px solid #eef2f6;
}

.settings-toggle:hover {
  background: #eef2f6;
}

/* Settings Panel */
.settings-panel {
  background: white;
  border-radius: 20px;
  padding: 0;
  margin-bottom: 20px;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease-out;
  box-shadow: 0 5px 15px rgba(0,0,0,0.03);
}

.settings-panel.open {
  max-height: 400px;
  padding: 25px;
}

.settings-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
}

.settings-btn {
  background: #f8fafd;
  border: 1px solid #eef2f6;
  padding: 15px 20px;
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 12px;
}

.settings-btn:hover:not(:disabled) {
  background: #eef2f6;
  transform: translateY(-2px);
}

.settings-btn .icon {
  font-size: 1.5rem;
}

.settings-btn .text {
  font-weight: 500;
  color: #1a1e2b;
}

.settings-btn .desc {
  font-size: 0.8rem;
  color: #6b7a8f;
  margin-top: 2px;
}

.settings-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* Main Card */
.main-card {
  background: white;
  border-radius: 20px;
  padding: 25px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.03);
}

/* Add Receipt Form */
.add-section {
  background: #f8fafd;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 25px;
  border: 1px solid #eef2f6;
}

.form-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.form-group {
  flex: 1;
  min-width: 200px;
}

.form-group input {
  width: 100%;
  padding: 14px 16px;
  border: 2px solid #eef2f6;
  border-radius: 14px;
  font-size: 0.95rem;
  transition: all 0.2s;
  background: white;
}

.form-group input:focus {
  outline: none;
  border-color: #4361ee;
}

.form-group input[type="file"] {
  padding: 10px;
  background: white;
}

.save-btn {
  background: #4361ee;
  color: white;
  border: none;
  padding: 14px 28px;
  border-radius: 14px;
  font-weight: 500;
  font-size: 0.95rem;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}

.save-btn:hover:not(:disabled) {
  background: #3651d4;
  transform: translateY(-2px);
}

.save-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* Sync Status */
.sync-status {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
  font-size: 0.85rem;
  color: #6b7a8f;
}

.sync-status .online {
  color: #059669;
}

.sync-status .offline {
  color: #dc2626;
}

.sync-status .syncing {
  color: #4361ee;
}

/* Search Bar */
.search-bar {
  margin-bottom: 25px;
}

.search-bar input {
  width: 100%;
  padding: 14px 20px;
  border: 2px solid #eef2f6;
  border-radius: 40px;
  font-size: 0.95rem;
  background: #f8fafd;
  transition: all 0.2s;
}

.search-bar input:focus {
  outline: none;
  border-color: #4361ee;
  background: white;
}

/* Year Sections */
.year-section {
  margin-bottom: 30px;
}

.year-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 2px solid #eef2f6;
}

.year-header h2 {
  font-size: 1.5rem;
  color: #1a1e2b;
  font-weight: 600;
}

.year-count {
  background: #eef2f6;
  padding: 4px 12px;
  border-radius: 40px;
  font-size: 0.85rem;
  color: #4a5568;
}

/* Month Grid */
.month-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 15px;
  margin-bottom: 20px;
}

.month-card {
  background: #f8fafd;
  border: 1px solid #eef2f6;
  border-radius: 16px;
  overflow: hidden;
  transition: all 0.2s;
}

.month-card:hover {
  border-color: #4361ee;
  transform: translateY(-2px);
}

.month-header {
  background: white;
  padding: 15px 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #eef2f6;
  cursor: pointer;
}

.month-header h3 {
  font-size: 1.1rem;
  font-weight: 600;
  color: #1a1e2b;
  display: flex;
  align-items: center;
  gap: 8px;
}

.month-badge {
  background: #4361ee;
  color: white;
  padding: 3px 10px;
  border-radius: 30px;
  font-size: 0.8rem;
  font-weight: 500;
}

.month-receipts {
  padding: 0;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease-out;
}

.month-receipts.expanded {
  max-height: 2000px;
  padding: 15px;
}

/* Receipt Items */
.receipt-item {
  background: white;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 10px;
  display: flex;
  gap: 12px;
  border: 1px solid #eef2f6;
  transition: all 0.2s;
}

.receipt-item:hover {
  border-color: #4361ee;
}

.receipt-thumb {
  width: 60px;
  height: 60px;
  border-radius: 10px;
  object-fit: cover;
  cursor: pointer;
  border: 1px solid #eef2f6;
}

.receipt-info {
  flex: 1;
}

.receipt-name {
  font-weight: 500;
  color: #1a1e2b;
  margin-bottom: 4px;
  font-size: 0.95rem;
}

.receipt-date {
  font-size: 0.8rem;
  color: #6b7a8f;
  display: flex;
  align-items: center;
  gap: 4px;
}

.receipt-actions {
  display: flex;
  gap: 6px;
  align-items: center;
}

.icon-btn {
  background: none;
  border: none;
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: #6b7a8f;
  transition: all 0.2s;
  font-size: 1rem;
}

.icon-btn:hover:not(:disabled) {
  background: #fee2e2;
  color: #dc2626;
}

.view-btn:hover {
  background: #e8f0fe;
  color: #4361ee;
}

/* Loading Spinner */
.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid #f3f3f3;
  border-top: 3px solid #4361ee;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 20px auto;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Empty States */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: #6b7a8f;
}

.empty-state .big-icon {
  font-size: 3rem;
  margin-bottom: 15px;
  opacity: 0.5;
}

.empty-state p {
  font-size: 1rem;
  margin-bottom: 5px;
}

.empty-state .small {
  font-size: 0.9rem;
  opacity: 0.7;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #1a1e2b;
  color: white;
  padding: 14px 24px;
  border-radius: 40px;
  font-size: 0.95rem;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  transform: translateY(100px);
  opacity: 0;
  transition: all 0.3s;
  z-index: 1000;
}

.toast.show {
  transform: translateY(0);
  opacity: 1;
}

.toast.success {
  background: #059669;
}

.toast.error {
  background: #dc2626;
}

/* Hidden */
.hidden {
  display: none;
}

/* Loading */
.loading {
  opacity: 0.6;
  pointer-events: none;
}

/* Responsive */
@media (max-width: 600px) {
  .form-row {
    flex-direction: column;
  }
  
  .month-grid {
    grid-template-columns: 1fr;
  }
  
  .settings-panel.open {
    padding: 15px;
  }
  
  .settings-grid {
    grid-template-columns: 1fr;
  }
  
  .app-header {
    flex-direction: column;
    align-items: stretch;
  }
  
  .auth-section {
    justify-content: space-between;
  }
}
</style>
<!-- Supabase JS Library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">
  <!-- Header with Auth -->
  <div class="app-header">
    <h1>
      📱 Receipt Keeper
      <span>Cloud Sync</span>
    </h1>
    
    <div class="auth-section">
      <div id="userInfo" class="user-info hidden">
        <span>👤</span>
        <span class="user-email" id="userEmail"></span>
      </div>
      <button class="auth-btn" id="authBtn" onclick="handleAuth()">Sign In</button>
      <button class="settings-toggle" onclick="toggleSettings()">
        <span>⚙️</span> Settings
      </button>
    </div>
  </div>

  <!-- Settings Panel -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-grid">
      <div class="settings-btn" onclick="exportReceipts()" id="exportBtn">
        <span class="icon">💾</span>
        <div>
          <div class="text">Backup Data</div>
          <div class="desc">Download all receipts</div>
        </div>
      </div>
      
      <div class="settings-btn" onclick="document.getElementById('importFile').click()" id="importBtn">
        <span class="icon">📂</span>
        <div>
          <div class="text">Import Data</div>
          <div class="desc">Restore from backup</div>
        </div>
      </div>
      
      <div class="settings-btn" onclick="clearAllReceipts()" id="clearBtn">
        <span class="icon">🗑️</span>
        <div>
          <div class="text">Clear All</div>
          <div class="desc">Delete everything</div>
        </div>
      </div>
      
      <div class="settings-btn" onclick="toggleMonthCollapse()">
        <span class="icon">📅</span>
        <div>
          <div class="text">Collapse All</div>
          <div class="desc">Toggle month views</div>
        </div>
      </div>
      
      <div class="settings-btn" onclick="syncFromCloud()" id="syncBtn">
        <span class="icon">🔄</span>
        <div>
          <div class="text">Sync from Cloud</div>
          <div class="desc">Refresh your receipts</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Main Card -->
  <div class="main-card">
    <!-- Add Receipt Form -->
    <div class="add-section">
      <div class="form-row">
        <div class="form-group">
          <input type="text" id="name" placeholder="Receipt name (e.g., Groceries)" autocomplete="off">
        </div>
        <div class="form-group">
          <input type="file" id="imageInput" accept="image/*">
        </div>
        <button class="save-btn" onclick="saveReceipt()" id="saveBtn">
          <span>+</span> Add Receipt
        </button>
      </div>
      <div class="sync-status" id="syncStatus">
        <span id="syncIcon">⚡</span>
        <span id="statusText">Checking connection...</span>
      </div>
    </div>

    <!-- Search -->
    <div class="search-bar">
      <input type="text" id="search" placeholder="🔍 Search receipts by name..." onkeyup="displayReceipts()">
    </div>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="spinner hidden"></div>

    <!-- Receipts Container -->
    <div id="receiptsContainer"></div>
  </div>
</div>

<!-- Hidden Import Input -->
<input type="file" id="importFile" accept=".json" class="hidden" onchange="importReceipts(event)">

<!-- Toast Notification -->
<div id="toast" class="toast"></div>

<script>
// ==================== SUPABASE CONFIGURATION ====================
// 🔧 REPLACE THESE WITH YOUR SUPABASE PROJECT DETAILS
const SUPABASE_URL = 'https://zmplzjbbsbkbwkvhpfth.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptcGx6amJic2JrYndrdmhwZnRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkzNjIyODgsImV4cCI6MjA4NDkzODI4OH0.E4DW4ApG5Okc09WMKA3QzsOTjurzc_QK_9MR2emaDqc';

// Initialize Supabase client
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: {
    persistSession: true,
    autoRefreshToken: true
  }
});

// ==================== APP STATE ====================
let receipts = JSON.parse(localStorage.getItem("receipts")) || [];
let expandedMonths = JSON.parse(localStorage.getItem("expandedMonths")) || {};
let currentUser = null;
let syncInProgress = false;

// ==================== INITIALIZATION ====================
async function init() {
  showLoading(true);
  
  // Check current user
  const { data: { user } } = await supabase.auth.getUser();
  currentUser = user;
  updateAuthUI();
  
  if (currentUser) {
    await loadReceiptsFromCloud();
    updateSyncStatus('online', 'Connected to cloud');
  } else {
    updateSyncStatus('offline', 'Sign in to sync across devices');
    displayReceipts();
  }
  
  showLoading(false);
}

// ==================== AUTH FUNCTIONS ====================
async function handleAuth() {
  if (currentUser) {
    await signOut();
  } else {
    await signIn();
  }
}

async function signIn() {
  try {
    const { data, error } = await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: window.location.origin
      }
    });
    
    if (error) throw error;
  } catch (error) {
    showToast('Sign in failed: ' + error.message, 'error');
  }
}

async function signOut() {
  try {
    const { error } = await supabase.auth.signOut();
    if (error) throw error;
    
    currentUser = null;
    receipts = JSON.parse(localStorage.getItem("receipts")) || [];
    updateAuthUI();
    displayReceipts();
    updateSyncStatus('offline', 'Signed out');
    showToast('Signed out successfully');
  } catch (error) {
    showToast('Sign out failed: ' + error.message, 'error');
  }
}

function updateAuthUI() {
  const authBtn = document.getElementById('authBtn');
  const userInfo = document.getElementById('userInfo');
  const userEmail = document.getElementById('userEmail');
  
  if (currentUser) {
    authBtn.textContent = 'Sign Out';
    authBtn.classList.add('secondary');
    userInfo.classList.remove('hidden');
    userEmail.textContent = currentUser.email;
    
    // Enable cloud-dependent buttons
    document.getElementById('syncBtn').disabled = false;
  } else {
    authBtn.textContent = 'Sign In with Google';
    authBtn.classList.remove('secondary');
    userInfo.classList.add('hidden');
    document.getElementById('syncBtn').disabled = true;
  }
}

// ==================== CLOUD FUNCTIONS ====================
async function loadReceiptsFromCloud() {
  if (!currentUser) return;
  
  try {
    updateSyncStatus('syncing', 'Loading from cloud...');
    
    const { data, error } = await supabase
      .from('receipts')
      .select('*')
      .eq('user_id', currentUser.id)
      .order('date', { ascending: false });
    
    if (error) throw error;
    
    if (data && data.length > 0) {
      receipts = data.map(r => ({
        id: r.id,
        name: r.name,
        image: r.image_url,
        thumbnail: r.thumbnail_url || r.image_url,
        date: r.date,
        displayDate: new Date(r.date).toLocaleString()
      }));
      
      localStorage.setItem("receipts", JSON.stringify(receipts));
      showToast(`Loaded ${receipts.length} receipts from cloud`);
    }
    
    displayReceipts();
    updateSyncStatus('online', 'Synced to cloud');
    
  } catch (error) {
    console.error('Load error:', error);
    showToast('Failed to load from cloud: ' + error.message, 'error');
    updateSyncStatus('online', 'Cloud connection error');
  }
}

async function syncFromCloud() {
  if (!currentUser) {
    showToast('Please sign in first', 'error');
    return;
  }
  
  await loadReceiptsFromCloud();
  toggleSettings();
}

async function saveReceiptToCloud(receipt, file) {
  if (!currentUser) return null;
  
  try {
    // Upload image to Supabase Storage
    const fileExt = file.name.split('.').pop();
    const fileName = `${Date.now()}-${Math.random().toString(36).substring(7)}.${fileExt}`;
    const filePath = `${currentUser.id}/${fileName}`;
    
    const { error: uploadError } = await supabase.storage
      .from('receipts')
      .upload(filePath, file, {
        cacheControl: '3600',
        upsert: false
      });
    
    if (uploadError) throw uploadError;
    
    // Get public URL
    const { data: { publicUrl } } = supabase.storage
      .from('receipts')
      .getPublicUrl(filePath);
    
    // Save receipt data to database
    const { error: dbError } = await supabase
      .from('receipts')
      .insert([{
        id: receipt.id,
        name: receipt.name,
        image_url: publicUrl,
        thumbnail_url: publicUrl,
        date: receipt.date,
        user_id: currentUser.id
      }]);
    
    if (dbError) throw dbError;
    
    return publicUrl;
    
  } catch (error) {
    console.error('Cloud save error:', error);
    throw error;
  }
}

async function deleteReceiptFromCloud(receiptId, imageUrl) {
  if (!currentUser) return;
  
  try {
    // Delete from database
    const { error: dbError } = await supabase
      .from('receipts')
      .delete()
      .eq('id', receiptId)
      .eq('user_id', currentUser.id);
    
    if (dbError) throw dbError;
    
    // Delete from storage if it's a cloud image
    if (imageUrl && imageUrl.includes(SUPABASE_URL)) {
      const filePath = imageUrl.split('/').pop();
      const { error: storageError } = await supabase.storage
        .from('receipts')
        .remove([`${currentUser.id}/${filePath}`]);
      
      if (storageError) console.error('Storage delete error:', storageError);
    }
    
  } catch (error) {
    console.error('Cloud delete error:', error);
    throw error;
  }
}

// ==================== RECEIPT OPERATIONS ====================
async function saveReceipt() {
  let name = document.getElementById("name").value.trim();
  let file = document.getElementById("imageInput").files[0];

  if (!name || !file) {
    showToast("Please add name and image", "error");
    return;
  }

  if (file.size > 5 * 1024 * 1024) { // 5MB limit
    showToast("Image too large (max 5MB)", "error");
    return;
  }

  let saveBtn = document.getElementById("saveBtn");
  let originalText = saveBtn.innerHTML;
  saveBtn.innerHTML = '<span>⏳</span> Uploading...';
  saveBtn.disabled = true;

  try {
    let receipt = {
      id: Date.now() + Math.random().toString(36).substr(2, 9),
      name: name,
      date: new Date().toISOString(),
      displayDate: new Date().toLocaleString()
    };

    let imageUrl;

    if (currentUser) {
      // Save to cloud
      updateSyncStatus('syncing', 'Uploading to cloud...');
      imageUrl = await saveReceiptToCloud(receipt, file);
      receipt.image = imageUrl;
      receipt.thumbnail = imageUrl;
      showToast('Receipt saved to cloud!');
    } else {
      // Save locally
      imageUrl = await readFileAsDataURL(file);
      receipt.image = imageUrl;
      receipt.thumbnail = imageUrl;
      showToast('Receipt saved locally');
    }

    receipts.unshift(receipt);
    receipts.sort((a, b) => new Date(b.date) - new Date(a.date));
    
    localStorage.setItem("receipts", JSON.stringify(receipts));

    document.getElementById("name").value = "";
    document.getElementById("imageInput").value = "";

    displayReceipts();
    
    if (currentUser) {
      updateSyncStatus('online', 'Synced to cloud');
    }
    
  } catch (error) {
    console.error('Save error:', error);
    showToast('Failed to save: ' + error.message, 'error');
  } finally {
    saveBtn.innerHTML = originalText;
    saveBtn.disabled = false;
  }
}

async function deleteReceipt(id) {
  if (!confirm("Delete this receipt?")) return;
  
  try {
    const receipt = receipts.find(r => r.id === id);
    
    if (currentUser) {
      await deleteReceiptFromCloud(id, receipt.image);
    }
    
    receipts = receipts.filter(r => r.id !== id);
    localStorage.setItem("receipts", JSON.stringify(receipts));
    displayReceipts();
    showToast("Receipt deleted");
    
  } catch (error) {
    console.error('Delete error:', error);
    showToast('Failed to delete: ' + error.message, 'error');
  }
}

// ==================== HELPER FUNCTIONS ====================
function readFileAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => resolve(e.target.result);
    reader.onerror = (e) => reject(e);
    reader.readAsDataURL(file);
  });
}

function updateSyncStatus(status, message) {
  const statusEl = document.getElementById('statusText');
  const syncIcon = document.getElementById('syncIcon');
  
  statusEl.textContent = message;
  
  if (status === 'online') {
    syncIcon.innerHTML = '●';
    syncIcon.className = 'online';
  } else if (status === 'syncing') {
    syncIcon.innerHTML = '↻';
    syncIcon.className = 'syncing';
  } else {
    syncIcon.innerHTML = '○';
    syncIcon.className = 'offline';
  }
}

function showLoading(show) {
  const spinner = document.getElementById('loadingSpinner');
  const container = document.getElementById('receiptsContainer');
  
  if (show) {
    spinner.classList.remove('hidden');
    container.innerHTML = '';
  } else {
    spinner.classList.add('hidden');
  }
}

function showToast(message, type = 'success') {
  let toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = 'toast ' + type + ' show';
  setTimeout(() => {
    toast.className = 'toast';
  }, 3000);
}

function toggleSettings() {
  let panel = document.getElementById('settingsPanel');
  panel.classList.toggle('open');
}

// ==================== DISPLAY FUNCTIONS ====================
function displayReceipts() {
  let container = document.getElementById("receiptsContainer");
  let search = document.getElementById("search").value.toLowerCase();
  
  if (receipts.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="big-icon">📸</div>
        <p>No receipts yet</p>
        <p class="small">${currentUser ? 'Add your first receipt above' : 'Sign in to sync across devices'}</p>
      </div>
    `;
    return;
  }
  
  // Filter receipts based on search
  let filteredReceipts = receipts.filter(r => 
    r.name.toLowerCase().includes(search)
  );
  
  if (filteredReceipts.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="big-icon">🔍</div>
        <p>No matching receipts</p>
        <p class="small">Try a different search term</p>
      </div>
    `;
    return;
  }
  
  // Organize filtered receipts
  let organized = {};
  filteredReceipts.forEach(receipt => {
    let date = new Date(receipt.date);
    let year = date.getFullYear();
    let month = date.toLocaleString('default', { month: 'long' });
    
    if (!organized[year]) {
      organized[year] = {};
    }
    if (!organized[year][month]) {
      organized[year][month] = [];
    }
    organized[year][month].push(receipt);
  });
  
  // Generate HTML
  let html = '';
  
  Object.keys(organized).sort((a, b) => b - a).forEach(year => {
    let yearTotal = 0;
    Object.values(organized[year]).forEach(month => {
      yearTotal += month.length;
    });
    
    html += `
      <div class="year-section">
        <div class="year-header">
          <h2>${year}</h2>
          <span class="year-count">${yearTotal} receipt${yearTotal !== 1 ? 's' : ''}</span>
        </div>
        <div class="month-grid">
    `;
    
    Object.keys(organized[year]).forEach(month => {
      let monthReceipts = organized[year][month];
      let monthKey = `${year}-${month}`;
      let isExpanded = expandedMonths[monthKey] !== false;
      
      html += `
        <div class="month-card">
          <div class="month-header" onclick="toggleMonth('${monthKey}')">
            <h3>
              <span>📅</span> ${month}
            </h3>
            <span class="month-badge">${monthReceipts.length}</span>
          </div>
          <div class="month-receipts ${isExpanded ? 'expanded' : ''}" id="month-${monthKey}">
      `;
      
      monthReceipts.forEach(receipt => {
        html += `
          <div class="receipt-item">
            <img src="${receipt.thumbnail || receipt.image}" class="receipt-thumb" onclick="viewImage('${receipt.image}')" alt="${receipt.name}">
            <div class="receipt-info">
              <div class="receipt-name">${receipt.name}</div>
              <div class="receipt-date">
                <span>🕒</span> ${new Date(receipt.date).toLocaleDateString()}
              </div>
            </div>
            <div class="receipt-actions">
              <button class="icon-btn view-btn" onclick="viewImage('${receipt.image}')" title="View">👁️</button>
              <button class="icon-btn" onclick="deleteReceipt('${receipt.id}')" title="Delete">🗑️</button>
            </div>
          </div>
        `;
      });
      
      html += `
          </div>
        </div>
      `;
    });
    
    html += `
        </div>
      </div>
    `;
  });
  
  container.innerHTML = html;
}

function toggleMonth(monthKey) {
  expandedMonths[monthKey] = !expandedMonths[monthKey];
  localStorage.setItem("expandedMonths", JSON.stringify(expandedMonths));
  
  let monthDiv = document.getElementById(`month-${monthKey}`);
  if (monthDiv) {
    monthDiv.classList.toggle('expanded');
  }
}

function toggleMonthCollapse() {
  let allExpanded = Object.values(expandedMonths).every(v => v === true);
  let monthKeys = [];
  
  receipts.forEach(receipt => {
    let date = new Date(receipt.date);
    let year = date.getFullYear();
    let month = date.toLocaleString('default', { month: 'long' });
    let monthKey = `${year}-${month}`;
    if (!monthKeys.includes(monthKey)) {
      monthKeys.push(monthKey);
    }
  });
  
  monthKeys.forEach(key => {
    expandedMonths[key] = allExpanded ? false : true;
  });
  
  localStorage.setItem("expandedMonths", JSON.stringify(expandedMonths));
  displayReceipts();
}

function viewImage(imageSrc) {
  window.open('', '_blank').document.write(`
    <html><head><title>Receipt</title><style>body{margin:0;background:#1a1e2b;display:flex;justify-content:center;align-items:center;min-height:100vh;}img{max-width:100%;max-height:100vh;object-fit:contain;}</style></head>
    <body><img src="${imageSrc}"></body>
  `);
}

// ==================== DATA MANAGEMENT ====================
function exportReceipts() {
  if (receipts.length === 0) {
    showToast("No receipts to export", "error");
    return;
  }
  
  let dataStr = JSON.stringify(receipts, null, 2);
  let dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
  let fileName = 'receipts-backup-' + new Date().toISOString().slice(0,10) + '.json';
  
  let link = document.createElement('a');
  link.setAttribute('href', dataUri);
  link.setAttribute('download', fileName);
  link.click();
  
  showToast("Backup created!");
  toggleSettings();
}

async function importReceipts(event) {
  let file = event.target.files[0];
  if (!file) return;
  
  let reader = new FileReader();
  
  reader.onload = async function(e) {
    try {
      let imported = JSON.parse(e.target.result);
      
      if (!Array.isArray(imported)) throw new Error("Invalid format");
      
      let valid = imported.every(r => r.name && r.image && r.date && r.id);
      if (!valid) throw new Error("Invalid receipt data");
      
      // Merge without duplicates
      let existingIds = new Set(receipts.map(r => r.id));
      let newReceipts = [...receipts];
      
      imported.forEach(r => {
        if (!existingIds.has(r.id)) {
          newReceipts.push(r);
        }
      });
      
      newReceipts.sort((a, b) => new Date(b.date) - new Date(a.date));
      receipts = newReceipts;
      
      localStorage.setItem("receipts", JSON.stringify(receipts));
      
      showToast(`Imported ${imported.length} receipts!`);
      displayReceipts();
      toggleSettings();
      
    } catch (error) {
      showToast("Invalid backup file", "error");
    }
    
    event.target.value = '';
  };
  
  reader.readAsText(file);
}

function clearAllReceipts() {
  if (receipts.length === 0) {
    showToast("No receipts to clear", "error");
    return;
  }
  
  if (confirm("Delete ALL receipts? This cannot be undone!")) {
    receipts = [];
    localStorage.setItem("receipts", JSON.stringify(receipts));
    displayReceipts();
    showToast("All receipts cleared");
    toggleSettings();
  }
}

// Listen for auth changes
supabase.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_IN' && session) {
    currentUser = session.user;
    updateAuthUI();
    showLoading(true);
    await loadReceiptsFromCloud();
    showLoading(false);
    showToast('Signed in successfully!');
  } else if (event === 'SIGNED_OUT') {
    currentUser = null;
    updateAuthUI();
    receipts = JSON.parse(localStorage.getItem("receipts")) || [];
    displayReceipts();
  }
});

// Initialize
init();

// Keyboard shortcut
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    saveReceipt();
  }
});
